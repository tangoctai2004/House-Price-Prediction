<!-- HEADER - CAL.COM STYLE -->
<nav class="top-nav">
    <a href="/" class="nav-brand">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="ProphetEstate Logo"
            style="height: 56px; width: auto;">
    </a>

    <button class="nav-hamburger" onclick="this.classList.toggle('active');document.querySelector('.nav-menu').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>

    <div class="nav-menu">
        <a href="/">Định giá AI</a>
        <a href="/search">Tìm kiếm</a>
        <a href="/analytics">Phân tích</a>
        <a href="/models">Mô hình AI</a>
        <a href="/news">Tin tức</a>
        <a href="/about">Về chúng tôi</a>
    </div>

    <div class="nav-actions">
        {% if user %}
        <div class="nav-user-wrap">
            <button class="nav-avatar-btn" onclick="this.parentElement.classList.toggle('open')">
                {% if user.avatar %}
                <img class="nav-avatar nav-avatar-img" src="{{ user.avatar }}" alt="{{ user.name }}">
                {% else %}
                <span class="nav-avatar">{{ user.name[0] | upper }}</span>
                {% endif %}
                <span class="nav-avatar-name">{{ user.name }}</span>
                <svg class="nav-avatar-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="nav-dropdown">
                <div class="nav-dropdown-header">
                    {% if user.avatar %}
                    <img class="nav-dropdown-avatar nav-dropdown-avatar-img" src="{{ user.avatar }}" alt="{{ user.name }}">
                    {% else %}
                    <span class="nav-dropdown-avatar">{{ user.name[0] | upper }}</span>
                    {% endif %}
                    <div>
                        <div class="nav-dropdown-name">{{ user.name }}</div>
                        <div class="nav-dropdown-email">{{ user.email }}</div>
                    </div>
                </div>
                <div class="nav-dropdown-divider"></div>
                <a href="/profile" class="nav-dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Hồ sơ cá nhân
                </a>
                <a href="/history" class="nav-dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Lịch sử định giá
                </a>
                <a href="/saved" class="nav-dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                    BĐS đã lưu
                </a>
                <div class="nav-dropdown-divider"></div>
                <a href="/logout" class="nav-dropdown-item nav-dropdown-logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Đăng xuất
                </a>
            </div>
        </div>
        {% else %}
        <span class="nav-signin" onclick="openAuthModal('login')">Đăng nhập</span>
        <button class="button-primary" onclick="openAuthModal('register')">Đăng ký</button>
        {% endif %}
    </div>
</nav>

<script>
document.addEventListener('click', function(e) {
    document.querySelectorAll('.nav-user-wrap.open').forEach(function(el) {
        if (!el.contains(e.target)) el.classList.remove('open');
    });
});
</script>

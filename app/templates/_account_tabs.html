<div class="account-tabs-bar">
    <div class="container" style="max-width: 960px;">
        <div class="account-tabs">
            <a href="/profile" class="account-tab {{ 'active' if active_tab == 'profile' }}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Hồ sơ cá nhân

                Lịch sử định giá
            </a>
            <a href="/saved" class="account-tab {{ 'active' if active_tab == 'saved' }}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
